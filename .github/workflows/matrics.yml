name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest

        with:

          ##########################################
          ## Authentication
          ##########################################

          token: ${{ secrets.METRICS_TOKEN }}

          ##########################################
          ## User
          ##########################################

          user: Renet-Reji

          ##########################################
          ## Output
          ##########################################

          filename: github-metrics.svg

          ##########################################
          ## Theme
          ##########################################

          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kolkata

          config_display: large

          ##########################################
          ## Languages
          ##########################################

          plugin_languages: yes
          plugin_languages_ignored: tex
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 365
          plugin_languages_recent_load: 500

          ##########################################
          ## Achievements
          ##########################################

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: detailed

          ##########################################
          ## Habits
          ##########################################

          plugin_habits: yes
          plugin_habits_days: 365
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          ##########################################
          ## Isometric Calendar
          ##########################################

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          ##########################################
          ## Lines Changed
          ##########################################

          plugin_lines: yes

          ##########################################
          ## Repositories
          ##########################################

          plugin_repositories: yes
          plugin_repositories_featured: Renet-Reji/RideInShade,Renet-Reji/Sign-Language-Translator
          plugin_repositories_order: featured, pinned, starred

          ##########################################
          ## Stars
          ##########################################

          plugin_stars: yes

          ##########################################
          ## Topics
          ##########################################

          plugin_topics: yes
          plugin_topics_limit: 20
          plugin_topics_mode: mastered

          ##########################################
          ## Follow-up
          ##########################################

          plugin_followup: yes
          plugin_followup_sections: repositories

          ##########################################
          ## Notable Contributions
          ##########################################

          plugin_notable: yes
          plugin_notable_from: organization

          ##########################################
          ## Traffic
          ##########################################

          plugin_traffic: yes

          ##########################################
          ## Gists
          ##########################################

          plugin_gists: yes

          ##########################################
          ## Discussions
          ##########################################

          plugin_discussions: yes

          ##########################################
          ## Community
          ##########################################

          plugin_people: yes
          plugin_people_types: followers, following

          ##########################################
          ## Reactions
          ##########################################

          plugin_reactions: yes

          ##########################################
          ## Introduction
          ##########################################

          plugin_introduction: yes
          plugin_introduction_title: yes

          ##########################################
          ## Recent Activity
          ##########################################

          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: all

          ##########################################
          ## Screenshot
          ##########################################

          output_action: commit